<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Oficina Mecânica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        :root {
            --cor-primaria: #2196F3;
            --cor-erro: #f44336;
            --cor-texto: #333;
            --cor-fundo: #f5f5f5;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--cor-fundo);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--cor-texto);
        }
        
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-header h2 {
            color: var(--cor-primaria);
            margin-bottom: 0.5rem;
        }
        
        .login-header i {
            font-size: 2.5rem;
            color: var(--cor-primaria);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            transition: border 0.3s;
        }
        
        .form-control:focus {
            border-color: var(--cor-primaria);
            outline: none;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #0d8bf2;
        }
        
        .dev-login {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }
        
        .dev-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: var(--cor-erro);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Badge visível apenas em desenvolvimento -->
    <div id="devBadge" class="dev-badge" style="display: none;">MODO DESENVOLVIMENTO</div>
    
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-car"></i>
            <h2>Oficina Mecânica</h2>
            <p>Sistema de Gerenciamento</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuário:</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn">Entrar</button>
            
            <div class="dev-login">
                <p>Dica: Use <strong>admin</strong> / <strong>admin123</strong> para testes</p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="./js/main.js"></script>
    <script>
        // Verifica se está em ambiente de desenvolvimento
        const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        // Mostra badge visual em desenvolvimento
        if (isDev) {
            document.getElementById('devBadge').style.display = 'block';
        }

        // Configuração do formulário
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Modo desenvolvimento: login automático
            if (isDev) {
                Toastify({
                    text: "Modo desenvolvimento: login automático ativado",
                    duration: 3000,
                    backgroundColor: "#4CAF50"
                }).showToast();
                
                // Simula dados de usuário admin
                sessionStorage.setItem('authToken', 'dev-token-fake');
                sessionStorage.setItem('usuario', JSON.stringify({
                    username: username || 'admin',
                    nivel_acesso: 3,
                    email: 'dev@localhost'
                }));
                
                setTimeout(() => {
                    window.location.href = 'menu.html';
                }, 1000);
                return;
            }
            
            // Modo produção: autenticação real
            if (typeof fazerLogin === 'function') {
                await fazerLogin(username, password);
            } else {
                Toastify({
                    text: "Erro: Sistema de autenticação não carregado!",
                    duration: 3000,
                    backgroundColor: "#f44336"
                }).showToast();
            }
        });
    </script>
</body>
</html>
