<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style/configuracoes.css">
    <title>Novo Veículo</title>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">
        <span class="fas fa-bars"></span>
    </button>
    <div class="navbar" id="navbar">
        <div class="logo">
            <img src="imagens/logo-oficina.jpg" alt="Logo" style="width: 40px;">
        </div>
        <hr>
        <ul class="menu">
            <li><a href="menu.html"><span class="fas fa-home"></span><span class="menu-texto">Página Inicial</span></a></li>
            <li><a href="mecanicos.html"><span class="fas fa-tools"></span><span class="menu-texto">Mecânicos</span></a></li>
            <li><a href="clientes.html"><span class="fas fa-users"></span><span class="menu-texto">Clientes</span></a></li>
            <li><a href="pecas.html"><span class="fas fa-car-battery"></span><span class="menu-texto">Peças</span></a></li>
            <li><a href="carros.html" class="active"><span class="fas fa-car"></span><span class="menu-texto">Veículos</span></a></li>
            <li><a href="departamentos.html"><span class="fas fa-warehouse"></span><span class="menu-texto">Departamentos</span></a></li>
            <li><a href="estoque.html"><span class="fas fa-boxes"></span><span class="menu-texto">Estoque</span></a></li>
            <li><a href="vendas.html"><span class="fas fa-cash-register"></span><span class="menu-texto">Vendas</span></a></li>
            <li><a href="configuracoes.html"><span class="fas fa-cogs"></span><span class="menu-texto">Configurações</span></a></li>
        </ul>
    </div>

    <main class="content">
        <div class="header">
            <h1>Cadastrar Veículo</h1>
            <div class="user-actions">
                <span class="fas fa-bell"></span>
                <button class="sair">Sair</button>
            </div>
        </div>
        
        <div class="settings-container">
            <form id="formVeiculo">
                <h3><i class="fas fa-car"></i> Dados do Veículo</h3>
                <div class="settings-row">
                    <div class="settings-item">
                        <label for="placa"><i class="fas fa-id-card"></i> Placa:</label>
                        <input type="text" id="placa" name="placa" placeholder="ABC-1234" required 
                               pattern="[A-Za-z]{3}-?\d{4}" title="Formato: ABC1234 ou ABC-1234">
                    </div>
                    <div class="settings-item">
                        <label for="modelo"><i class="fas fa-car-side"></i> Modelo:</label>
                        <input type="text" id="modelo" name="modelo" placeholder="Ex: Fiat Uno" required>
                    </div>
                </div>

                <div class="settings-row">
                    <div class="settings-item">
                        <label for="ano"><i class="fas fa-calendar-alt"></i> Ano:</label>
                        <input type="number" id="ano" name="ano" min="1900" max="2024" required>
                    </div>
                    <div class="settings-item">
                        <label for="proprietario"><i class="fas fa-user-tie"></i> Proprietário (CPF):</label>
                        <input type="text" id="proprietario" name="proprietario" 
                               placeholder="000.000.000-00" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}">
                    </div>
                </div>

                <div class="settings-row">
                    <div class="settings-item">
                        <label for="cor"><i class="fas fa-palette"></i> Cor:</label>
                        <input type="text" id="cor" name="cor">
                    </div>
                    <div class="settings-item">
                        <label for="km"><i class="fas fa-tachometer-alt"></i> Quilometragem:</label>
                        <input type="number" id="km" name="km" min="0">
                    </div>
                </div>

                <div class="settings-item">
                    <button type="submit" class="btn-save">
                        <i class="fas fa-save"></i> Cadastrar Veículo
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
