    <script src="js/main.js"></script>
<script>
    // Função para carregar departamentos
    function carregarDepartamentos() {
        const container = document.getElementById('listaDepartamentos');
        const departamentos = JSON.parse(localStorage.getItem('departamentos')) || [];
        
        if (departamentos.length === 0) {
            container.innerHTML = `
                <div class="item-lista empty-state">
                    <span class="fas fa-info-circle"></span>
                    <div class="info">
                        <h3>Nenhum departamento cadastrado</h3>
                        <p>Adicione seu primeiro departamento usando o botão acima</p>
                    </div>
                </div>
            `;
            return;
        }
        
        container.innerHTML = departamentos.map(depto => `
            <div class="item-lista">
                <span class="fas fa-warehouse"></span>
                <div class="info">
                    <h3>${depto.nome}</h3>
                    <p>Responsável: ${depto.responsavel || 'Não definido'}</p>
                </div>
            </div>
        `).join('');
    }

    // Carrega departamentos quando a página abre
    document.addEventListener('DOMContentLoaded', carregarDepartamentos);

    }
</script>
