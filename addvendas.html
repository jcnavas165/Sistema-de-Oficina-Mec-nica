<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
   <!----<link rel="stylesheet" href="style/configuracoes.css"> -->
   <link rel="stylesheet" href="style/mecanicos.css">
    <title>Registrar Venda</title>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">
        <span class="fas fa-bars"></span>
    </button>

    <div class="navbar" id="navbar">
        <div class="logo">
            <img src="imagens/logo-oficina.jpg" alt="Logo" style="width: 40px;">
        </div>
        <hr>
        <ul class="menu">
            <li><a href="menu.html"><span class="fas fa-home"></span><span class="menu-texto">Página Inicial</span></a></li>
            <li><a href="mecanicos.html"><span class="fas fa-tools"></span><span class="menu-texto">Mecânicos</span></a></li>
            <li><a href="clientes.html"><span class="fas fa-users"></span><span class="menu-texto">Clientes</span></a></li>
            <li><a href="pecas.html"><span class="fas fa-car-battery"></span><span class="menu-texto">Peças</span></a></li>
            <li><a href="carros.html"><span class="fas fa-car"></span><span class="menu-texto">Veículos</span></a></li>
            <li><a href="departamentos.html"><span class="fas fa-warehouse"></span><span class="menu-texto">Departamentos</span></a></li>
            <li><a href="estoque.html"><span class="fas fa-boxes"></span><span class="menu-texto">Estoque</span></a></li>
            <li><a href="vendas.html" class="active"><span class="fas fa-cash-register"></span><span class="menu-texto">Vendas</span></a></li>
            <li><a href="configuracoes.html"><span class="fas fa-cogs"></span><span class="menu-texto">Configurações</span></a></li>
        </ul>
    </div>

    <main class="content">
        <div class="header">
            <h1>Nova Venda</h1>
            <div class="user-actions">
                <span class="fas fa-bell"></span>
                <button class="sair">Sair</button>
            </div>
        </div>
        
        <div class="venda-container">
            <div class="selecionar-cliente">
                <h3><i class="fas fa-user"></i> Cliente</h3>
                <select id="cliente" class="cliente-select">
                    <option value="">Selecione um cliente...</option>
                    <!-- Clientes serão carregados dinamicamente -->
                </select>
            </div>

            <div class="selecionar-produto">
                <h3><i class="fas fa-box-open"></i> Adicionar Produtos</h3>
                <div class="produto-row">
                    <select id="produto" class="produto-select"></select>
                    <input type="number" id="qtd" min="1" value="1" placeholder="Qtd">
                    <button class="btn-add" onclick="adicionarItemVenda()">
                        <i class="fas fa-plus"></i> Adicionar
                    </button>
                </div>
            </div>

            <div class="itens-venda">
                <h3><i class="fas fa-shopping-cart"></i> Itens da Venda</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Qtd</th>
                            <th>Preço Unit.</th>
                            <th>Subtotal</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="itens"></tbody>
                </table>
            </div>

            <div class="resumo-venda">
                <div class="total-venda">
                    <h3>Total: R$ <span id="total">0.00</span></h3>
                </div>
                <div class="forma-pagamento">
                    <label for="pagamento"><i class="fas fa-money-bill-wave"></i> Forma de Pagamento:</label>
                    <select id="pagamento">
                        <option value="dinheiro">Dinheiro</option>
                        <option value="cartao_credito">Cartão de Crédito</option>
                        <option value="cartao_debito">Cartão de Débito</option>
                        <option value="pix">PIX</option>
                    </select>
                </div>
            </div>

            <div class="acoes-venda">
                <button class="btn-cancelar" onclick="window.location.href='vendas.html'">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button class="btn-finalizar" onclick="finalizarVenda()">
                    <i class="fas fa-check"></i> Finalizar Venda
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="js/main.js"></script>
</body>
</html>
