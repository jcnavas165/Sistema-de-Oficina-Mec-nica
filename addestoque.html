<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style/configuracoes.css">
    <title>Adicionar ao Estoque</title>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">
        <span class="fas fa-bars"></span>
    </button>

    <div class="navbar" id="navbar">
        <div class="logo">
            <img src="imagens/logo-oficina.jpg" alt="Logo" style="width: 40px;">
        </div>
        <hr>
        <ul class="menu">
            <li><a href="menu.html"><span class="fas fa-home"></span><span class="menu-texto">Página Inicial</span></a></li>
            <li><a href="mecanicos.html"><span class="fas fa-tools"></span><span class="menu-texto">Mecânicos</span></a></li>
            <li><a href="clientes.html"><span class="fas fa-users"></span><span class="menu-texto">Clientes</span></a></li>
            <li><a href="pecas.html"><span class="fas fa-car-battery"></span><span class="menu-texto">Peças</span></a></li>
            <li><a href="carros.html"><span class="fas fa-car"></span><span class="menu-texto">Veículos</span></a></li>
            <li><a href="departamentos.html"><span class="fas fa-warehouse"></span><span class="menu-texto">Departamentos</span></a></li>
            <li><a href="estoque.html" class="active"><span class="fas fa-boxes"></span><span class="menu-texto">Estoque</span></a></li>
            <li><a href="vendas.html"><span class="fas fa-cash-register"></span><span class="menu-texto">Vendas</span></a></li>
            <li><a href="configuracoes.html"><span class="fas fa-cogs"></span><span class="menu-texto">Configurações</span></a></li>
        </ul>
    </div>

    <main class="content">
        <div class="header">
            <h1>Cadastrar Produto</h1>
            <div class="user-actions">
                <span class="fas fa-bell"></span>
                <button class="sair">Sair</button>
            </div>
        </div>
        
        <div class="settings-container">
            <form id="formProduto">
                <h3><i class="fas fa-box-open"></i> Dados do Produto</h3>
                <div class="settings-row">
                    <div class="settings-item">
                        <label for="nome"><i class="fas fa-tag"></i> Nome do Produto:</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="settings-item">
                        <label for="categoria"><i class="fas fa-list"></i> Categoria:</label>
                        <select id="categoria" required>
                            <option value="">Selecione...</option>
                            <option value="peca">Peça</option>
                            <option value="ferramenta">Ferramenta</option>
                            <option value="lubrificante">Lubrificante</option>
                            <option value="acessorio">Acessório</option>
                        </select>
                    </div>
                </div>

                <div class="settings-row">
                    <div class="settings-item">
                        <label for="quantidade"><i class="fas fa-boxes"></i> Quantidade Inicial:</label>
                        <input type="number" id="quantidade" min="0" required>
                    </div>
                    <div class="settings-item">
                        <label for="preco"><i class="fas fa-dollar-sign"></i> Preço Unitário (R$):</label>
                        <input type="number" id="preco" step="0.01" min="0" required>
                    </div>
                </div>

                <div class="settings-row">
                    <div class="settings-item">
                        <label for="codigo"><i class="fas fa-barcode"></i> Código:</label>
                        <input type="text" id="codigo">
                    </div>
                    <div class="settings-item">
                        <label for="fornecedor"><i class="fas fa-truck"></i> Fornecedor:</label>
                        <input type="text" id="fornecedor">
                    </div>
                </div>

                <div class="settings-item">
                    <label for="descricao"><i class="fas fa-align-left"></i> Descrição:</label>
                    <textarea id="descricao" rows="3"></textarea>
                </div>

                <div class="settings-item">
                    <button type="button" class="btn-save" onclick="salvarProduto()">
                        <i class="fas fa-save"></i> Cadastrar Produto
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
