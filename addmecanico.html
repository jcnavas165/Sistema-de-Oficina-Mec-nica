<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style/mecanicos.css">
    <title>Adicionar Mecânico</title>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">
        <span class="fas fa-bars"></span>
    </button>
    <div class="navbar" id="navbar">
        <div class="logo">
            <img src="imagens/logo-oficina.jpg" alt="Logo" style="width: 40px;">
        </div>
        <hr>
        <ul class="menu">
            <li><a href="menu.html"><span class="fas fa-home"></span><span class="menu-texto">Página Inicial</span></a></li>
            <li><a href="mecanicos.html" class="active"><span class="fas fa-tools"></span><span class="menu-texto">Mecânicos</span></a></li>
            <li><a href="clientes.html"><span class="fas fa-users"></span><span class="menu-texto">Clientes</span></a></li>
            <li><a href="pecas.html"><span class="fas fa-car-battery"></span><span class="menu-texto">Peças</span></a></li>
            <li><a href="carros.html"><span class="fas fa-car"></span><span class="menu-texto">Veículos</span></a></li>
            <li><a href="departamentos.html"><span class="fas fa-warehouse"></span><span class="menu-texto">Departamentos</span></a></li>
            <li><a href="estoque.html"><span class="fas fa-boxes"></span><span class="menu-texto">Estoque</span></a></li>
            <li><a href="vendas.html"><span class="fas fa-cash-register"></span><span class="menu-texto">Vendas</span></a></li>
            <li><a href="configuracoes.html"><span class="fas fa-cogs"></span><span class="menu-texto">Configurações</span></a></li>
        </ul>
    </div>

    <main class="content">
        <div class="header">
            <h1>Novo Mecânico</h1>
            <div class="user-actions">
                <span class="fas fa-bell"></span>
                <button class="sair">Sair</button>
            </div>
        </div>
        
        <div class="settings-container">
            <form id="formMecanico">
                <h3><i class="fas fa-id-badge"></i> Dados Profissionais</h3>
                <div class="settings-row">
                    <div class="settings-item">
                        <label for="nome"><i class="fas fa-user"></i> Nome Completo:</label>
                        <input type="text" id="nome" name="nome" required minlength="5">
                    </div>
                    <div class="settings-item">
                        <label for="especialidade"><i class="fas fa-certificate"></i> Especialidade:</label>
                        <select id="especialidade" name="especialidade" required>
                            <option value="">Selecione...</option>
                            <option value="motor">RH</option>
                            <option value="motor">Administração</option>
                            <option value="motor">Juridico</option>
                            <option value="motor">Comprador</option>
                            <option value="motor">Motor</option>
                            <option value="eletrica">Elétrica</option>
                            <option value="suspensao">Suspensão</option>
                            <option value="freios">Freios</option>
                            <option value="ar_condicionado">Ar Condicionado</option>
                        </select>
                    </div>
                </div>

                <h3><i class="fas fa-user-tie"></i> Dados Pessoais</h3>
                <div class="settings-row">
                    <div class="settings-item">
                        <label for="cpf"><i class="fas fa-id-card"></i> CPF:</label>
                        <input type="text" id="cpf" name="cpf" required
                               pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00">
                    </div>
                    <div class="settings-item">
                        <label for="data_nascimento"><i class="fas fa-birthday-cake"></i> Data Nascimento:</label>
                        <input type="date" id="data_nascimento" name="data_nascimento">
                    </div>
                </div>

                <h3><i class="fas fa-phone"></i> Contato</h3>
                <div class="settings-row">
                    <div class="settings-item">
                        <label for="telefone"><i class="fas fa-mobile-alt"></i> Telefone:</label>
                        <input type="tel" id="telefone" name="telefone" required
                               pattern="\([0-9]{2}\) [0-9]{4,5}-[0-9]{4}" placeholder="(00) 00000-0000">
                    </div>
                    <div class="settings-item">
                        <label for="email"><i class="fas fa-envelope"></i> E-mail:</label>
                        <input type="email" id="email" name="email" placeholder="mecanico@oficina.com">
                    </div>
                </div>

                <div class="settings-item">
                    <button type="submit" class="btn-save">
                        <i class="fas fa-save"></i> Cadastrar Mecânico
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
