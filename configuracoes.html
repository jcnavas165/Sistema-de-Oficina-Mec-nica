    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

</head>
<body>
<button class="menu-toggle" id="menuToggle">
    <span class="fas fa-bars"></span>
</button>

            <li>

                    <span class="fas fa-tools"></span>

                </a>
            </li>
            <li>
                <a href="clientes.html">
                    <span class="fas fa-users"></span>
                    <span class="menu-texto">Clientes</span>

            </li>
            <li>
                <a href="pecas.html">
                    <span class="fas fa-car-battery"></span>
                    <span class="menu-texto">Peças</span>
                </a>
            </li>
            <li>
                <a href="carros.html">
                    <span class="fas fa-car"></span>
                    <span class="menu-texto">Veículos</span>

            <li>

            </li>
            <li>

                    <span class="fas fa-cogs"></span>

                </a>
            </li>
        </ul>
    </div>

    <main class="content">
        
            
            <button class="btn-voltar" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button class="btn-voltar" onclick="window.location.href='menu.html'">
                <i class="fas fa-home"></i>
            </button>
            <h1>Configurações do Sistema <span class="fas fa-cogs"></span></h1>
            <div class="user-actions">
                <span class="fas fa-bell"></span>
                <button class="sair">Sair</button>
            </div>
        </div>
        
        <div class="settings-container">
            <form id="configForm">
                <h3><i class="fas fa-palette"></i> Aparência</h3>
                <div class="settings-row">
                    <div class="settings-item">
                        <label for="tema">Tema:</label>
                        <select id="tema" name="tema">
                            <option value="claro">Tema Claro</option>
                            <option value="escuro">Tema Escuro</option>
                            <option value="azul">Tema Azul Profissional</option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <label for="tamanhoFonte">Tamanho da Fonte:</label>
                        <select id="tamanhoFonte" name="tamanhoFonte">
                            <option value="pequeno">Pequeno (12px)</option>
                            <option value="medio">Médio (16px)</option>
                            <option value="grande">Grande (20px)</option>
                        </select>
                    </div>
                </div>

                <h3><i class="fas fa-user-cogs"></i> Perfil</h3>
                <div class="settings-row">
                    <div class="settings-item">
                        <label for="username">Nome de Usuário:</label>
                        <input type="text" id="username" value="Admin" required>
                    </div>
                    <div class="settings-item">
                        <label for="email">Email:</label>
                        <input type="email" id="email" value="admin@oficina.com" required>
                    </div>
                </div>

                <h3><i class="fas fa-lock"></i> Segurança</h3>
                <div class="settings-item">
                    <label for="senha">Nova Senha:</label>
                    <input type="password" id="senha" placeholder="••••••••">
                </div>
                <div class="settings-item">
                    <label for="confirmarSenha">Confirmar Senha:</label>
                    <input type="password" id="confirmarSenha" placeholder="••••••••">
                </div>

                <div class="settings-item">
                    <button type="button" class="btn-save" onclick="aplicarConfiguracoes()">
                        Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        // Função para aplicar configurações
        function aplicarConfiguracoes() {
            const tema = document.getElementById('tema').value;
            const tamanhoFonte = document.getElementById('tamanhoFonte').value;
            
            localStorage.setItem('temaOficina', tema);
            localStorage.setItem('tamanhoFonteOficina', tamanhoFonte);
            
            document.body.className = `tema-${tema}`;
            document.body.style.fontSize = {
                'pequeno': '12px',
                'medio': '16px',
                'grande': '20px'
            }[tamanhoFonte];
            
            alert('Configurações salvas com sucesso!');
        }

        // Carregar configurações ao abrir a página
        window.onload = () => {
            document.getElementById('tema').value = localStorage.getItem('temaOficina') || 'claro';
            document.getElementById('tamanhoFonte').value = localStorage.getItem('tamanhoFonteOficina') || 'medio';
        }
    </script>
</body>
</html>
